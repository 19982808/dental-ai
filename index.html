<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rynar Dental AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--surface:#131929;--card:#1a2235;--border:#1f2d47;
  --teal:#00c9a7;--teal-dim:#00896f;--teal-soft:rgba(0,201,167,0.08);
  --text:#e6eaf2;--muted:#5a6a85;
  --user-bg:#0f2a4a;--ai-bg:#131929;
  --wa:#25d366;--radius:16px;--rsm:10px;
}
html,body{height:100%;background:var(--bg);font-family:'Poppins',sans-serif;font-weight:300;color:var(--text);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,201,167,0.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,119,255,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}

.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);overflow:hidden}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:44px;height:44px;background:linear-gradient(135deg,var(--teal-dim),var(--teal));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 0 18px rgba(0,201,167,0.2)}
.header h1{font-size:15px;font-weight:600;letter-spacing:.3px}
.header p{font-size:11px;color:var(--teal);margin-top:2px;letter-spacing:.4px}
.hdr-btns{margin-left:auto;display:flex;gap:8px}
.hdr-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:15px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.hdr-btn:hover{border-color:var(--teal-dim);color:var(--teal)}
.hdr-btn.on{border-color:var(--teal-dim);color:var(--teal)}

/* EQ bars */
.eq{display:flex;align-items:flex-end;gap:2px;height:12px;margin-right:2px}
.eq span{display:block;width:2px;background:var(--teal);border-radius:1px;opacity:0;transition:opacity .3s}
.eq span:nth-child(1){height:5px;animation:eq1 .8s ease-in-out infinite}
.eq span:nth-child(2){height:9px;animation:eq2 .9s ease-in-out infinite .1s}
.eq span:nth-child(3){height:6px;animation:eq1 1.1s ease-in-out infinite .2s}
.eq span:nth-child(4){height:11px;animation:eq2 .75s ease-in-out infinite .05s}
@keyframes eq1{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
@keyframes eq2{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.3)}}
.hdr-btn.on .eq span{opacity:1}

/* CHAT */
#chatView{display:flex;flex-direction:column;flex:1;overflow:hidden}
#chat-box{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#chat-box::-webkit-scrollbar{width:3px}
#chat-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.message{max-width:83%;padding:11px 15px;border-radius:var(--radius);font-size:14px;line-height:1.65;animation:fadeUp .22s ease both;word-wrap:break-word}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.message.ai{align-self:flex-start;background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:4px;color:#cdd5e0}
.message.user{align-self:flex-end;background:var(--user-bg);border:1px solid #0a3a66;border-bottom-right-radius:4px;color:var(--text)}

/* Typing */
.typing{padding:10px 14px;display:flex;align-items:center;gap:5px;flex-shrink:0}
.typing.hidden{display:none}
.typing span{width:7px;height:7px;background:var(--teal);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;opacity:.7}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

/* WhatsApp buttons */
.wa-btn{display:flex;align-items:center;gap:9px;background:var(--wa);color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:var(--rsm);text-decoration:none;margin:3px 0;width:fit-content;max-width:83%;align-self:flex-start;transition:opacity .2s;animation:fadeUp .25s ease both}
.wa-btn:hover{opacity:.87}
.wa-btn.clinic{background:#128c7e}

/* Input */
.input-area{display:flex;align-items:center;gap:7px;padding:12px 14px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0}
#user-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-family:'Poppins',sans-serif;font-size:14px;font-weight:300;padding:10px 13px;outline:none;transition:border-color .2s}
#user-input:focus{border-color:var(--teal-dim)}
#user-input::placeholder{color:var(--muted)}
.ia-btn{background:var(--teal);border:none;border-radius:var(--rsm);color:#0b0f1a;font-size:16px;width:40px;height:40px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .1s}
.ia-btn:hover{opacity:.85}
.ia-btn:active{transform:scale(.93)}
.ia-btn.sec{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.ia-btn.sec:hover{border-color:var(--teal-dim);color:var(--teal)}

/* Admin */
#adminView{flex:1;overflow-y:auto;padding:18px;display:none}
#adminView h2{font-size:15px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
#adminView table{width:100%;border-collapse:collapse;font-size:13px}
#adminView th{background:var(--card);color:var(--muted);font-weight:600;font-size:10px;letter-spacing:.6px;text-transform:uppercase;padding:9px 11px;text-align:left;border-bottom:1px solid var(--border)}
#adminView td{padding:11px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;line-height:1.5}
#adminView tr:hover td{background:var(--teal-soft)}
#adminView small{color:var(--muted);font-size:11px}
.wa-icon{font-size:19px;cursor:pointer;text-decoration:none;margin-right:7px}
.del-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.45;transition:opacity .2s}
.del-btn:hover{opacity:1}
#adminView .back-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 15px;border-radius:var(--rsm);cursor:pointer;font-family:'Poppins',sans-serif;font-size:13px;margin-top:14px;transition:all .2s}
#adminView .back-btn:hover{border-color:var(--teal-dim);color:var(--teal)}
.empty{text-align:center;color:var(--muted);padding:36px 0;font-size:13px}

@media(max-width:540px){.app{max-width:100%;border:none}.message{max-width:90%}}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">🦷</div>
    <div>
      <h1>Rynar Dental AI</h1>
      <p>Premium Smile Experience</p>
    </div>
    <div class="hdr-btns">
      <!-- Jazz toggle -->
      <button class="hdr-btn" id="jazzBtn" onclick="toggleJazz()" title="Background jazz">
        <div class="eq"><span></span><span></span><span></span><span></span></div>
      </button>
      <!-- Voice toggle -->
      <button class="hdr-btn on" id="voiceBtn" onclick="toggleVoice()" title="Toggle voice">🔊</button>
      <!-- Admin -->
      <button class="hdr-btn" onclick="toggleAdmin()" title="Admin">⚙️</button>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="chatView">
    <div id="chat-box"></div>
    <div id="typing-indicator" class="typing hidden">
      <span></span><span></span><span></span>
    </div>
    <div class="input-area">
      <button class="ia-btn sec" id="imgBtn" onclick="document.getElementById('imgInput').click()" title="Upload smile photo">📷</button>
      <input type="text" id="user-input" placeholder="Ask me anything about your smile…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"/>
      <button class="ia-btn sec" onclick="startListening()" title="Voice input">🎤</button>
      <button class="ia-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView">
    <h2>Bookings Dashboard</h2>
    <table>
      <thead><tr><th>#</th><th>Patient</th><th>Appointment</th><th>Actions</th></tr></thead>
      <tbody id="bookingBody"></tbody>
    </table>
    <p id="emptyMsg" class="empty">No bookings yet.</p>
    <button class="back-btn" onclick="toggleAdmin()">⬅ Back to Chat</button>
  </div>

</div>

<!-- Hidden file input -->
<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>

<script>
// ═══════════════════════════════════════════════
// CONFIG — add your key here
// ═══════════════════════════════════════════════
// API key is in server.js
const CLINIC_WA       = "27000000000"; // your clinic WhatsApp number, no +

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let chatHistory   = [];
let bookings      = JSON.parse(localStorage.getItem("rynar_bookings") || "[]");
let awaitingField = null;
let patientDraft  = {};
let voiceOn       = true;
let jazzOn        = false;
let audioCtx      = null;
let masterGain    = null;
let jazzTimer     = null;
let chordIdx      = 0;
let chosenVoice   = null;

const FIELDS = ["name","phone","date","time","service"];
const PROMPTS = {
  name:    "What's your full name?",
  phone:   "What's your WhatsApp number? (with country code, e.g. +27…)",
  date:    "What date would you like to come in?",
  time:    "Morning or afternoon — or a specific time?",
  service: "What are you coming in for? Checkup, cleaning, whitening, braces consult, extraction, or something else?"
};

// ═══════════════════════════════════════════════
// SYSTEM PROMPT
// ═══════════════════════════════════════════════
const SYSTEM = `You are Rynar — a warm, knowledgeable dental assistant for Rynar Dental, a premium clinic.

PERSONALITY:
You are like a trusted friend who happens to know everything about dentistry.
Warm, calm, reassuring — never clinical or robotic. Dental anxiety is real and you ease it.
Light and personable. You use the patient's name once you know it.
You keep the conversation going naturally — like a real person would.

HOW YOU TALK:
- Respond naturally and conversationally — like texting a knowledgeable friend
- Keep responses concise: 1-3 sentences for simple questions, more only when genuinely needed
- Never use bullet points in casual conversation
- Always acknowledge what they said before answering
- Ask a follow-up question to keep the conversation going when appropriate
- Never say "As an AI" or "I'm just a chatbot" — you are Rynar
- Never say "Certainly!" "Absolutely!" "Of course!" — too robotic
- If they say hi or greet you, greet them back warmly and ask how you can help their smile today

WHAT YOU KNOW:
Teeth whitening, braces and Invisalign, dental implants, root canals (reassure — it's painless!),
extractions and wisdom teeth, veneers and cosmetic work, gum health, children's dentistry,
dental emergencies (always urgent), general oral hygiene tips.

BOOKING:
When someone wants to book, say something warm like:
"I'd love to get you booked in — let me take a few quick details."
The system will handle the rest.

RULES:
- Keep it human and warm at all times
- If they seem nervous, be extra gentle and reassuring
- Gently nudge toward booking when relevant but never pushy
- Short responses always feel more human than long ones`;

// ═══════════════════════════════════════════════
// VOICE — deep male, browser Speech API
// ═══════════════════════════════════════════════
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  const preferred = [
    "Google UK English Male",
    "Microsoft George - English (United Kingdom)",
    "Microsoft David - English (United States)",
    "Daniel","Alex","Fred"
  ];
  for (const name of preferred) {
    const v = voices.find(v => v.name === name);
    if (v) { chosenVoice = v; return; }
  }
  chosenVoice = voices.find(v =>
    v.lang.startsWith("en") &&
    /male|david|george|daniel|alex|fred/i.test(v.name)
  ) || voices.find(v => v.lang.startsWith("en")) || voices[0];
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  if (!voiceOn || !text) return;
  speechSynthesis.cancel();
  const clean = text.replace(/<[^>]*>/g,"").replace(/[*_]/g,"");
  const utt   = new SpeechSynthesisUtterance(clean);
  if (chosenVoice) utt.voice = chosenVoice;
  utt.rate   = 0.85;
  utt.pitch  = 0.75;
  utt.volume = 1;
  speechSynthesis.speak(utt);
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById("voiceBtn");
  btn.classList.toggle("on", voiceOn);
  btn.textContent = voiceOn ? "🔊" : "🔇";
  if (!voiceOn) speechSynthesis.cancel();
}

// ═══════════════════════════════════════════════
// JAZZ — Web Audio API
// ═══════════════════════════════════════════════
function freq(midi) { return 440 * Math.pow(2,(midi-69)/12); }

const CHORDS = [
  [62,65,69,74],[67,71,74,77],[65,69,72,76],[65,69,72,76],
  [60,63,67,70],[65,69,72,75],[58,62,65,69],[58,62,65,69]
];
const BASS = [50,55,53,53,48,53,46,46];

function playNote(midi, time, dur, type, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(masterGain);
  o.type = type;
  o.frequency.value = freq(midi);
  o.detune.value = (Math.random()-.5)*7;
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(vol, time+0.07);
  g.gain.exponentialRampToValueAtTime(0.0001, time+dur);
  o.start(time); o.stop(time+dur+.05);
}

function jazzBeat() {
  const now  = audioCtx.currentTime;
  const beat = 1.15;
  const ch   = CHORDS[chordIdx % CHORDS.length];

  // Chord
  ch.forEach((m,i) => playNote(m, now, beat*1.7, "sine", 0.034-i*0.005));
  // Bass
  playNote(BASS[chordIdx % BASS.length]-12, now, beat*1.6, "triangle", 0.07);
  // Sparse melody
  if (Math.random() > 0.42) {
    const pent = [0,2,4,7,9];
    const note = ch[0] + pent[Math.floor(Math.random()*pent.length)] + 12;
    playNote(note, now + Math.random()*beat*.5, 0.3+Math.random()*.5, "sine", 0.022);
  }
  chordIdx++;
}

function startJazz() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;

  // Simple delay reverb
  const delay = audioCtx.createDelay(2);
  const fb    = audioCtx.createGain();
  const wet   = audioCtx.createGain();
  delay.delayTime.value = 0.3;
  fb.gain.value = 0.32; wet.gain.value = 0.38;
  masterGain.connect(delay);
  delay.connect(fb); fb.connect(delay);
  delay.connect(wet); wet.connect(audioCtx.destination);
  masterGain.connect(audioCtx.destination);

  jazzBeat();
  jazzTimer = setInterval(jazzBeat, 1150);
}

function stopJazz() {
  clearInterval(jazzTimer);
  if (masterGain) {
    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.8);
    setTimeout(() => { try { masterGain.disconnect(); } catch(e){} }, 1000);
  }
}

function toggleJazz() {
  const btn = document.getElementById("jazzBtn");
  jazzOn = !jazzOn;
  btn.classList.toggle("on", jazzOn);
  jazzOn ? startJazz() : stopJazz();
}

// ═══════════════════════════════════════════════
// AI CALL
// ═══════════════════════════════════════════════
async function askAI(userMsg, imageBase64=null) {
  showTyping(true);

  // Build the user message — text only for gpt-3.5-turbo
  // If image, describe it and skip the base64 (gpt-3.5-turbo can't see images)
  const userContent = imageBase64
    ? "The patient has uploaded a photo of their smile/teeth for analysis. Please give warm, encouraging observational feedback and recommend a consultation."
    : userMsg;

  // Add to history BEFORE the API call so it's included
  chatHistory.push({ role:"user", content: userContent });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  try {
    const res = await fetch("/api/chat", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model:             "gpt-3.5-turbo",
        messages: [
          { role:"system", content: SYSTEM },
          ...chatHistory
        ],
        temperature:       0.78,
        max_tokens:        250,
        frequency_penalty: 0.5,
        presence_penalty:  0.3
      })
    });

    const data = await res.json();

    if (!res.ok) {
      const msg = data?.error?.message || res.status;
      console.error("OpenAI error:", msg);
      showTyping(false);
      if (res.status === 401) return "⚠️ API key issue — double-check your key in the Vercel environment variables.";
      if (res.status === 404) return "⚠️ Model not found — check your OpenAI plan has API access.";
      if (res.status === 429) return "I'm getting a lot of requests right now — give me a second and try again.";
      return "Something went wrong on my end. Try again in a moment.";
    }

    const reply = data.choices[0].message.content.trim();
    chatHistory.push({ role:"assistant", content: reply });
    showTyping(false);
    return reply;

  } catch(e) {
    showTyping(false);
    console.error("Fetch error:", e);
    return "I lost my connection for a second — try again?";
  }
}

// ═══════════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById("user-input");
  const text  = input.value.trim();
  if (!text) return;
  input.value = "";

  appendMessage("user", text);

  // Booking flow
  if (awaitingField) {
    await handleBookingField(text); return;
  }

  // Trigger booking
  if (/\b(book|appointment|schedule|come in|visit|slot|reserve)\b/i.test(text)) {
    awaitingField = "name";
    const reply = "I'd love to get you sorted — let me take a few quick details. " + PROMPTS.name;
    appendMessage("ai", reply);
    speak(reply);
    return;
  }

  // Image upload trigger
  if (/\b(photo|picture|image|look at|my teeth|my smile|upload|show you)\b/i.test(text)) {
    const reply = "Of course — tap the 📷 button below and upload your photo. I'll take a careful look 😊";
    appendMessage("ai", reply);
    speak(reply);
    return;
  }

  const reply = await askAI(text);
  appendMessage("ai", reply);
  speak(reply);
}

// ═══════════════════════════════════════════════
// BOOKING FLOW
// ═══════════════════════════════════════════════
async function handleBookingField(value) {
  patientDraft[awaitingField] = value;
  const idx = FIELDS.indexOf(awaitingField);

  if (idx < FIELDS.length - 1) {
    awaitingField = FIELDS[idx+1];
    appendMessage("ai", PROMPTS[awaitingField]);
    speak(PROMPTS[awaitingField]);
  } else {
    awaitingField = null;
    await confirmBooking();
  }
}

async function confirmBooking() {
  const b  = patientDraft;
  const id = "RD" + Date.now().toString().slice(-5);
  const booking = { id, ...b, bookedAt: new Date().toLocaleString() };

  bookings.push(booking);
  localStorage.setItem("rynar_bookings", JSON.stringify(bookings));
  renderBookings();

  const patientMsg = encodeURIComponent(
    `✅ *Rynar Dental — Booking Confirmed*\n\n` +
    `📋 Ref: ${id}\n👤 ${b.name}\n📅 ${b.date} at ${b.time}\n🦷 ${b.service}\n\n` +
    `We look forward to seeing your smile! To reschedule, just reply here.\n— Rynar Dental`
  );
  const clinicMsg = encodeURIComponent(
    `🦷 *New Booking — Rynar Dental*\n\nRef: ${id}\nPatient: ${b.name}\nPhone: ${b.phone}\nDate: ${b.date} at ${b.time}\nService: ${b.service}\nBooked: ${booking.bookedAt}`
  );

  const patientPhone = b.phone.replace(/\D/g,"");
  const waPatient    = `https://wa.me/${patientPhone}?text=${patientMsg}`;
  const waClinic     = `https://wa.me/${CLINIC_WA}?text=${clinicMsg}`;

  const reply = `All done, ${b.name}! ✅ You're booked for ${b.date} at ${b.time} — ${b.service}. Your reference is *${id}*. Tap below to get your confirmation on WhatsApp 👇`;
  appendMessage("ai", reply);
  speak(`All done ${b.name}, you're booked for ${b.date} at ${b.time}. See you soon!`);

  // WA buttons
  const box = document.getElementById("chat-box");
  const a1  = document.createElement("a");
  a1.href = waPatient; a1.target = "_blank"; a1.className = "wa-btn";
  a1.innerHTML = "📲 Send My Confirmation on WhatsApp";
  box.appendChild(a1);

  const a2 = document.createElement("a");
  a2.href = waClinic; a2.target = "_blank"; a2.className = "wa-btn clinic";
  a2.innerHTML = "🏥 Notify Clinic on WhatsApp";
  box.appendChild(a2);
  box.scrollTop = box.scrollHeight;

  patientDraft = {};
}

// ═══════════════════════════════════════════════
// IMAGE UPLOAD
// ═══════════════════════════════════════════════
async function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = "";

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const b64 = ev.target.result;
    // Show preview
    const box  = document.getElementById("chat-box");
    const wrap = document.createElement("div");
    wrap.className = "message user";
    const img  = document.createElement("img");
    img.src = b64;
    img.style.cssText = "max-width:190px;border-radius:10px;margin-top:4px;display:block";
    wrap.appendChild(img);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;

    const reply = await askAI("Please analyse this smile photo.", b64);
    appendMessage("ai", reply);
    speak(reply);
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════
function toggleAdmin() {
  const cv = document.getElementById("chatView");
  const av = document.getElementById("adminView");
  const showing = av.style.display === "block";
  cv.style.display = showing ? "flex"  : "none";
  av.style.display = showing ? "none"  : "block";
  if (!showing) renderBookings();
}

function renderBookings() {
  const tbody = document.getElementById("bookingBody");
  const empty = document.getElementById("emptyMsg");
  tbody.innerHTML = "";
  if (!bookings.length) { empty.style.display="block"; return; }
  empty.style.display = "none";
  bookings.forEach((b,i) => {
    const phone = b.phone.replace(/\D/g,"");
    const msg   = encodeURIComponent(`Hi ${b.name}, confirming your Rynar Dental appointment on ${b.date} at ${b.time}. See you soon! 😊`);
    const tr    = document.createElement("tr");
    tr.innerHTML = `
      <td style="font-size:11px;color:var(--muted)">${b.id}</td>
      <td><strong>${b.name}</strong><br><small>${b.service}</small><br><small>${b.phone}</small></td>
      <td>${b.date}<br><small>${b.time}</small></td>
      <td>
        <a href="https://wa.me/${phone}?text=${msg}" target="_blank" class="wa-icon" title="WhatsApp">📲</a>
        <button class="del-btn" onclick="deleteBooking(${i})" title="Delete">🗑</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function deleteBooking(i) {
  if (!confirm("Remove this booking?")) return;
  bookings.splice(i,1);
  localStorage.setItem("rynar_bookings", JSON.stringify(bookings));
  renderBookings();
}

// ═══════════════════════════════════════════════
// VOICE INPUT
// ═══════════════════════════════════════════════
function startListening() {
  // Request mic permission first
  navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => {});
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { appendMessage("ai","Voice input isn't supported in this browser — try Chrome."); return; }
  const r = new SR(); r.lang="en-US";
  r.start();
  r.onresult = e => {
    document.getElementById("user-input").value = e.results[0][0].transcript;
    sendMessage();
  };
  r.onerror = e => console.warn("Voice input error:", e.error);
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function appendMessage(sender, text) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.innerHTML = text
    .replace(/\*([^*]+)\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping(show) {
  document.getElementById("typing-indicator").classList.toggle("hidden",!show);
  if (show) {
    const box = document.getElementById("chat-box");
    box.scrollTop = box.scrollHeight;
  }
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
window.addEventListener("load", () => {
  renderBookings();
  // Load voices — some browsers need a moment
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  loadVoices();
  setTimeout(() => {
    loadVoices(); // retry after delay for Chrome
    const greet = "Hello… I'm Rynar, your personal dental AI 🦷 Whether you have questions about your smile, want to explore treatments, or you're ready to book — I'm here. What can I help you with today?";
    appendMessage("ai", greet);
    setTimeout(() => speak(greet), 300);
  }, 600);
});
</script>
