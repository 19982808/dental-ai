<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rynar Dental AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">🦷</div>
    <div>
      <h1>Rynar Dental AI</h1>
      <p>Premium Smile Experience</p>
    </div>

    <div class="hdr-btns">
      <button class="hdr-btn" onclick="showView('payment')" title="Payment">💳</button>
      <button class="hdr-btn" onclick="showView('gallery')" title="Gallery">🖼️</button>
      <button class="hdr-btn" onclick="showView('admin')" title="Admin">⚙️</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('chat')">💬 Chat</button>
    <button class="nav-tab" onclick="showView('symptom')">🩺 Symptoms</button>
    <button class="nav-tab" onclick="showView('guides')">📚 Guides</button>
    <button class="nav-tab" onclick="showView('payment')">💳 Pay</button>
  </div>

  <!-- CHAT -->
  <div id="view-chat" class="view active">
    <div id="chat-box"></div>

    <div class="input-area">
      <input id="user-input" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- SYMPTOMS -->
  <div id="view-symptom" class="view">
    <div class="view-scroll">
      <h2>Symptoms Checker</h2>
      <div id="symptomGrid"></div>
      <button onclick="diagnose()">Analyse</button>
      <div id="diagnosisResult"></div>
    </div>
  </div>

  <!-- GUIDES -->
  <div id="view-guides" class="view">
    <div class="view-scroll">
      <h2>Treatment Guides</h2>
      <div id="guidesGrid"></div>
    </div>
  </div>

  <!-- PAYMENT -->
  <div id="view-payment" class="view">
    <div class="view-scroll">
      <h2>Consultation Plans</h2>

      <div class="payment-cards">
        <button onclick="openPesapal(500)">Basic – KES 500</button>
        <button onclick="openPesapal(1500)">Premium – KES 1500</button>
      </div>
    </div>
  </div>

  <!-- PESAPAL MODAL -->
  <div id="pesapalModal" class="modal hidden">
    <div class="modal-content">

      <h3>Complete Payment</h3>

      <input id="pesapalName" placeholder="Full Name"/>
      <input id="pesapalEmail" placeholder="Email"/>
      <input id="pesapalPhone" placeholder="Phone (+254...)"/>

      <div id="pesapalAmount"></div>

      <button id="payBtn" class="teal-btn" onclick="submitPesapal()">Proceed →</button>
      <button class="close-btn" onclick="closePesapal()">Cancel</button>

    </div>
  </div>

  <!-- GALLERY -->
  <div id="view-gallery" class="view">
    <div class="view-scroll">
      <h2>Smile Gallery</h2>
      <div id="galleryGrid"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="view-admin" class="view">
    <div class="view-scroll">
      <h2>Bookings</h2>
      <table>
        <tbody id="bookingBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="script.js"></script>

<script>

/* NAVIGATION */
function showView(view) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + view).classList.add("active");
}

/* OPEN MODAL */
let pesapalData = {};

function openPesapal(amount) {
  pesapalData.amount = amount;
  document.getElementById("pesapalAmount").innerText = "Amount: KES " + amount;
  document.getElementById("pesapalModal").classList.remove("hidden");
}

/* CLOSE */
function closePesapal() {
  document.getElementById("pesapalModal").classList.add("hidden");
}

/* PAYMENT */
async function submitPesapal() {

  const btn = document.getElementById("payBtn");

  pesapalData.name = document.getElementById("pesapalName").value.trim();
  pesapalData.email = document.getElementById("pesapalEmail").value.trim();
  pesapalData.phone = document.getElementById("pesapalPhone").value.trim();

  if (!pesapalData.name || !pesapalData.email || !pesapalData.phone) {
    alert("All fields are required");
    return;
  }

  if (!pesapalData.phone.startsWith("+254")) {
    alert("Use format +254...");
    return;
  }

  try {
    btn.innerText = "Processing...";
    btn.disabled = true;

    const res = await fetch("/api/pay", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(pesapalData)
    });

    const data = await res.json();

    if (data.redirect_url) {
      window.location.href = data.redirect_url;
    } else {
      throw new Error();
    }

  } catch (err) {
    alert("Payment failed");
    btn.innerText = "Proceed →";
    btn.disabled = false;
  }
}

/* SUCCESS CHECK */
window.addEventListener("load", () => {
  const status = new URLSearchParams(window.location.search).get("status");

  if (status === "COMPLETED") {
    alert("✅ Payment successful!");
  }
});

/* PLACEHOLDERS */
function sendMessage(){ alert("Chat not connected yet"); }
function diagnose(){ alert("Diagnosis logic missing"); }

</script>

</body>
</html>
