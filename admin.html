<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concoct Dental Admin</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #2a0d1f, #0d0612);
    color: white;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,215,0,0.3);
  }

  .header h1 { margin: 0; font-size: 20px; }
  .header p { margin: 0; font-size: 12px; opacity: 0.7; }
  .logo { font-size: 30px; }

  .container {
    padding: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,215,0,0.3);
    text-align: left;
  }

  th {
    background: rgba(255,215,0,0.2);
    color: black;
  }

  td button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    background: red;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  td button:hover {
    opacity: 0.8;
  }

  .empty {
    text-align: center;
    padding: 30px 0;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🦷</div>
  <div>
    <h1>Concoct Dental Admin</h1>
    <p>Manage Bookings & Leads</p>
  </div>
</div>

<div class="container">
  <h2>Bookings Table</h2>
  <table id="bookingTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="bookingBody">
      <!-- Bookings will populate here -->
    </tbody>
  </table>
  <div id="emptyMsg" class="empty">No bookings yet.</div>
</div>

<script>
  const bookingBody = document.getElementById('bookingBody');
  const emptyMsg = document.getElementById('emptyMsg');

  // Load bookings from localStorage
  let bookings = JSON.parse(localStorage.getItem('bookings')) || [];

  function renderBookings() {
    bookingBody.innerHTML = '';
    if (bookings.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    } else {
      emptyMsg.style.display = 'none';
    }

    bookings.forEach((b, i) => {
      const row = document.createElement('tr');

      row.innerHTML = `
        <td>${i+1}</td>
        <td>${b.name}</td>
        <td>${b.date}</td>
        <td>
          <button onclick="deleteBooking(${i})">Delete</button>
        </td>
      `;

      bookingBody.appendChild(row);
    });
  }

  function deleteBooking(index) {
    if(confirm('Delete this booking?')) {
      bookings.splice(index, 1);
      localStorage.setItem('bookings', JSON.stringify(bookings));
      renderBookings();
    }
  }

  renderBookings();
</script>

</body>
</html>
